<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: "Hermes Output" }}</title>
  <meta name="color-scheme" content="dark">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; line-height: 1.6; }
    .container-lg { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 0; }
    header .container-lg { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
    header a { color: #e6edf3; text-decoration: none; }
    header a:hover { color: #58a6ff; }
    .logo { font-weight: 600; font-size: 18px; }
    .nav-links a { margin-left: 16px; font-size: 14px; color: #8b949e; }
    .nav-links a:hover { color: #58a6ff; }
    .page-content { min-height: 60vh; padding: 24px 16px; }
    footer { text-align: center; padding: 24px 0; color: #484f58; font-size: 12px; border-top: 1px solid #21262d; }
    footer a { color: #8b949e; }
    h1, h2, h3 { color: #f0f6fc; margin: 24px 0 12px; font-weight: 600; }
    h1 { font-size: 28px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
    h2 { font-size: 22px; margin-top: 28px; }
    a { color: #58a6ff; }
    a:hover { text-decoration: underline; }
    code { background: #161b22; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    pre { background: #161b22; padding: 16px; border-radius: 6px; overflow-x: auto; }
    img { max-width: 100%; border-radius: 6px; }
    hr { border: none; border-top: 1px solid #21262d; margin: 24px 0; }
    blockquote { border-left: 3px solid #30363d; padding-left: 12px; color: #8b949e; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px 12px; border: 1px solid #30363d; text-align: left; }
    th { background: #161b22; }
  </style>
</head>
<body>
  <header>
    <div class="container-lg">
      <a href="{{ site.baseurl }}/" class="logo">⎇ Hermes Output</a>
      <div class="nav-links">
        <a href="{{ site.baseurl }}/">Home</a>
        <a href="https://github.com/Jason-md-byte/hermes-pages">GitHub</a>
      </div>
    </div>
  </header>

  <div class="page-content">
    <div class="container-lg">
      {{ content }}
    </div>
  </div>

  <footer>
    <div class="container-lg">
      <p>Powered by <a href="{{ site.baseurl }}/">Hermes Agent</a> · 
      <a href="https://github.com/Jason-md-byte/hermes-pages">Source</a> · 
      Daily auto-sync</p>
    </div>
  </footer>
</body>
</html>
